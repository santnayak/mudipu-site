<!-- 
  Mudipu Logo - SVG Version
  Can be used directly in HTML or exported to .svg file
  
  Usage:
  <img src="mudipu-logo.svg" alt="Mudipu" />
-->

<svg width="160" height="40" viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Red dot with glow -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dot -->
  <circle cx="8" cy="20" r="4" fill="#EF4444" filter="url(#glow)"/>
  
  <!-- Text: mudipu -->
  <text x="24" y="28" font-family="JetBrains Mono, monospace" font-size="20" font-weight="400" fill="currentColor">mudipu</text>
</svg>
