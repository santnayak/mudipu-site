<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Imprint — Mudipu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0b0f19 0%, #1a1f35 100%);
      color: #e6edf3;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeIn 0.8s ease-in;
    }
    
    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #58a6ff 0%, #a371f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .content {
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px;
      animation: slideUp 0.6s ease-out;
    }
    
    .info-section {
      margin-bottom: 30px;
    }
    
    .info-section h2 {
      font-size: 1.2rem;
      color: #58a6ff;
      margin-bottom: 10px;
    }
    
    .info-section p {
      color: #9da7b3;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    
    .back-link {
      display: inline-block;
      margin-top: 40px;
      padding: 12px 30px;
      background: rgba(88, 166, 255, 0.1);
      border: 2px solid #58a6ff;
      border-radius: 8px;
      color: #58a6ff;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .back-link:hover {
      background: #58a6ff;
      color: #0b0f19;
      transform: scale(1.05);
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }
      
      .content {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Imprint</h1>
    </div>
    
    <div class="content">
      <div class="info-section">
        <h2>Information according to § 5 TMG</h2>
        <p><strong>Name:</strong> Santhosh Nayak</p>
      </div>
      
      <div class="info-section">
        <h2>Address</h2>
        <p>Kaiserslauterer Str. 42</p>
        <p>66123 Saarbuecken</p>
        <p>Germany</p>
      </div>
      
      <div class="info-section">
        <h2>Contact</h2>
        <p><strong>Email:</strong> <a href="mailto:santhoshnayak0903@gmail.com" style="color: #58a6ff; text-decoration: none;">santhoshnayak0903@gmail.com</a></p>
      </div>
      
      <a href="index.html" class="back-link">← Back to Home</a>
    </div>
  </div>
</body>
</html>
